name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -coverprofile=coverage.out | tee test-output.txt

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          PCT=$(LC_ALL=C awk '/^ok/ && /coverage:/ { for(i=1;i<=NF;i++) if($i=="coverage:") { v=$(i+1); gsub(/%/,"",v); sum+=v; n++; break } } END { if(n>0) printf "%.1f", sum/n }' test-output.txt)
          COLOR=red
          if [ "$(echo "$PCT >= 90" | bc)" -eq 1 ]; then COLOR=brightgreen
          elif [ "$(echo "$PCT >= 75" | bc)" -eq 1 ]; then COLOR=green
          elif [ "$(echo "$PCT >= 60" | bc)" -eq 1 ]; then COLOR=yellow
          elif [ "$(echo "$PCT >= 40" | bc)" -eq 1 ]; then COLOR=orange
          fi
          sed -i "s|coverage-[0-9.]*%25-[a-z]*|coverage-${PCT}%25-${COLOR}|" README.md
          if git diff --quiet README.md; then
            echo "Badge already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Docs: Update coverage badge to ${PCT}%"
            git push
          fi

      - name: Build
        run: go build -trimpath -ldflags="-X github.com/Chocapikk/pik/pkg/cli.Version=ci" ./cmd/pik/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
