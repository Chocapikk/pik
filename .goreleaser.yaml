version: 2
project_name: pik

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pik/
    binary: pik
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X github.com/Chocapikk/pik/pkg/cli.Version=v{{ .Version }}"

archives:
  - formats: binary
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"

signs:
  - cmd: minisign
    signature: "${artifact}.minisig"
    args:
      - "-Sm"
      - "${artifact}"
      - "-s"
      - "/tmp/minisign.key"
    artifacts: checksum

changelog:
  sort: asc
  groups:
    - title: "New Features"
      regexp: '^Feat:'
    - title: "Bug Fixes"
      regexp: '^Fix:'
    - title: "Performance"
      regexp: '^Perf:'
    - title: "Refactoring"
      regexp: '^Refactor:'
    - title: "Documentation"
      regexp: '^Docs:'
    - title: "Tests"
      regexp: '^Test:'
    - title: "Other"
      order: 999

release:
  name_template: "Pik v{{ .Version }}"
  github:
    owner: Chocapikk
    name: pik
